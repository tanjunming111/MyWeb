<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网站 - 编辑日记</title>
    <style>
        .edit-container {
            max-width: 700px;
            margin: 30px auto;
            padding: 0 15px;
        }
        .back-btn {
            display: inline-block;
            padding: 8px 20px;
            background-color: #e0e0e0;
            color: #333;
            text-decoration: none;
            border-radius: 20px;
            font-size: 14px;
            transition: background-color 0.2s ease;
            margin-bottom: 20px;
        }
        .back-btn:hover {
            background-color: #d0d0d0;
        }
        .edit-section {
            background: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 30px;
        }
        .edit-section h3 {
            margin-top: 0;
            color: #333;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        .form-group input[type="date"] {
            width: 100%;
            max-width: 250px;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
        }
        .form-group textarea {
            width: 100%;
            min-height: 150px;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            line-height: 1.7;
            resize: vertical;
            font-family: inherit;
            box-sizing: border-box;
        }
        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-block;
            padding: 10px 24px;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        .btn-save {
            background-color: #333;
            color: #fff;
        }
        .btn-save:hover {
            background-color: #555;
        }
        .btn-delete {
            background-color: #d9534f;
            color: #fff;
        }
        .btn-delete:hover {
            background-color: #c9302c;
        }
        .btn-secondary {
            background-color: #e0e0e0;
            color: #333;
        }
        .btn-secondary:hover {
            background-color: #d0d0d0;
        }
        .existing-list {
            list-style: none;
            padding: 0;
        }
        .existing-list li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 15px;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .existing-list li span {
            font-size: 15px;
            color: #333;
        }
        .existing-list li .item-actions {
            display: flex;
            gap: 8px;
        }
        .existing-list li .btn {
            padding: 6px 16px;
            font-size: 13px;
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 15px;
            color: #fff;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }
        .toast.success {
            background-color: #5cb85c;
        }
        .toast.error {
            background-color: #d9534f;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9998;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal {
            background: #fff;
            border-radius: 10px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .modal p {
            font-size: 16px;
            margin-bottom: 20px;
        }
        .modal .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .file-link-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .btn-link {
            display: inline-block;
            padding: 8px 18px;
            background-color: #2d8cf0;
            color: #fff;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        .btn-link:hover {
            background-color: #2d8cf0dd;
        }
        .file-status {
            font-size: 13px;
            color: #999;
        }
        .file-status.linked {
            color: #5cb85c;
        }
    </style>
</head>
<body>
    <div style="background-color: #f1f1f1; padding: 20px;">
        <a href="index.html">
            <img src="tjm.jpg" alt="tjm"
                style="width:80px; height:80px; border-radius:50%; object-fit:cover;">
        </a>
    </div>

    <div class="edit-container">
        <a href="javascript:history.back()" class="back-btn">&larr; 返回上一页</a>

        <div class="file-link-bar">
            <button class="btn-link" id="link-btn" onclick="linkFile()">关联 diary-data.js</button>
            <span class="file-status" id="file-status">未关联</span>
        </div>
        <div class="file-link-bar">
            <button class="btn-link" id="link-version-btn" onclick="linkVersionFile()">关联 version.js</button>
            <span class="file-status" id="version-file-status">未关联，需手动更新</span>
        </div>

        <!-- 新增/编辑区域 -->
        <div class="edit-section">
            <h3 id="form-title">新增日记</h3>
            <div class="form-group">
                <label for="date-input">日期</label>
                <input type="date" id="date-input" lang="zh-CN">
            </div>
            <div class="form-group">
                <label for="content-input">内容（每行一段）</label>
                <textarea id="content-input" placeholder="在这里输入日记内容..."></textarea>
            </div>
            <div class="form-actions">
                <button class="btn btn-save" onclick="saveEntry()">保存</button>
                <button class="btn btn-secondary" onclick="resetForm()">清空</button>
            </div>
        </div>

        <!-- 已有日记列表 -->
        <div class="edit-section">
            <h3>已有日记</h3>
            <ul class="existing-list" id="existing-list">
                <!-- 由 JS 动态生成 -->
            </ul>
        </div>
    </div>

    <div style="background-color:#f1f1f1; text-align:center; padding:40px;">
        <p>我的网站</p>
    </div>

    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>

    <!-- 删除确认弹窗 -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <p id="modal-text">确认删除？</p>
            <div class="modal-actions">
                <button class="btn btn-delete" id="modal-confirm">确认删除</button>
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
            </div>
        </div>
    </div>

    <script src="version.js"></script>
    <script>
        var diaryVersion = 1;

        (function() {
            var s = document.createElement('script');
            s.src = 'diary-data.js?t=' + (typeof diaryVersion !== 'undefined' ? diaryVersion : Date.now());
            s.onload = function() {
                // 从数据文件中获取最新的版本号
                if (typeof window.diaryVersion !== 'undefined' && window.diaryVersion > diaryVersion) {
                    diaryVersion = window.diaryVersion;
                }
                renderList();
                setTodayDate();
                initFileLink();
                initVersionFileLink();
                // 检查 URL 参数，自动加载对应日期的日记
                var params = new URLSearchParams(window.location.search);
                var dateParam = params.get("date");
                if (dateParam) {
                    editEntry(dateParam);
                }
            };
            document.head.appendChild(s);
        })();

        var editingDate = null; // 当前正在编辑的日期（null 表示新增模式）
        var fileHandle = null;  // 关联的本地文件句柄

        // ===== IndexedDB 存取文件句柄 =====
        var DB_NAME = "diary_db";
        var STORE_NAME = "file_handles";

        function openDB() {
            return new Promise(function(resolve, reject) {
                var req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = function() {
                    req.result.createObjectStore(STORE_NAME);
                };
                req.onsuccess = function() { resolve(req.result); };
                req.onerror = function() { reject(req.error); };
            });
        }

        async function saveHandle(handle) {
            var db = await openDB();
            return new Promise(function(resolve, reject) {
                var tx = db.transaction(STORE_NAME, "readwrite");
                tx.objectStore(STORE_NAME).put(handle, "diary_file");
                tx.oncomplete = function() { resolve(); };
                tx.onerror = function() { reject(tx.error); };
            });
        }

        async function loadHandle() {
            var db = await openDB();
            return new Promise(function(resolve, reject) {
                var tx = db.transaction(STORE_NAME, "readonly");
                var req = tx.objectStore(STORE_NAME).get("diary_file");
                req.onsuccess = function() { resolve(req.result || null); };
                req.onerror = function() { reject(req.error); };
            });
        }

        // ===== 关联本地文件 =====
        async function linkFile() {
            if (!window.showOpenFilePicker) {
                showToast("当前浏览器不支持文件关联功能", "error");
                return;
            }
            try {
                var handle = await window.showOpenFilePicker({
                    types: [{
                        description: "JavaScript 文件",
                        accept: { "application/javascript": [".js"] }
                    }]
                });
                fileHandle = handle[0];
                await saveHandle(fileHandle);
                updateFileStatus(true);
                showToast("已关联本地文件", "success");
            } catch (e) {
                if (e.name !== "AbortError") {
                    showToast("关联失败: " + e.message, "error");
                }
            }
        }

        // 更新文件状态显示
        function updateFileStatus(linked) {
            var status = document.getElementById("file-status");
            if (linked) {
                status.textContent = "已关联，保存时自动同步到本地文件";
                status.className = "file-status linked";
            } else {
                status.textContent = "未关联本地文件";
                status.className = "file-status";
            }
        }

        // 检查并请求文件权限
        async function verifyPermission(handle) {
            var opts = { mode: "readwrite" };
            if ((await handle.queryPermission(opts)) === "granted") {
                return true;
            }
            if ((await handle.requestPermission(opts)) === "granted") {
                return true;
            }
            return false;
        }

        // 生成 diary-data.js 文件内容
        function generateFileContent() {
            var data = loadDiaryData();
            var lines = [];
            lines.push("// ==========================================");
            lines.push("// 日记数据文件 - 数据管理核心");
            lines.push("// ==========================================");
            lines.push("// 数据直接存储在此文件中");
            lines.push("// 通过 edit.html 编辑后自动同步写入本地文件");
            lines.push("");
            lines.push("// 日记数据（编辑后自动同步到此文件）");
            lines.push("var defaultDiaryData = [");
            data.forEach(function(entry, i) {
                lines.push("    {");
                lines.push("        date: \"" + entry.date + "\",");
                lines.push("        paragraphs: [");
                entry.paragraphs.forEach(function(p) {
                    lines.push("            \"" + p.replace(/\\/g, "\\\\").replace(/"/g, "\\\"") + "\",");
                });
                lines.push("        ]");
                if (i < data.length - 1) {
                    lines.push("    },");
                } else {
                    lines.push("    }");
                }
            });
            lines.push("];");
            lines.push("");
            lines.push("// ===== 数据读写接口 =====");
            lines.push("");
            lines.push("function loadDiaryData() {");
            lines.push("    return defaultDiaryData;");
            lines.push("}");
            lines.push("");
            lines.push("function saveDiaryData(data) {");
            lines.push("    defaultDiaryData = data;");
            lines.push("}");
            lines.push("");
            lines.push("function getDiaryEntry(date) {");
            lines.push("    return defaultDiaryData.find(function(e) { return e.date === date; });");
            lines.push("}");
            lines.push("");
            lines.push("function addDiaryEntry(date, paragraphs) {");
            lines.push("    if (defaultDiaryData.find(function(e) { return e.date === date; })) return false;");
            lines.push("    defaultDiaryData.push({ date: date, paragraphs: paragraphs });");
            lines.push("    defaultDiaryData.sort(function(a, b) { return a.date < b.date ? -1 : 1; });");
            lines.push("    return true;");
            lines.push("}");
            lines.push("");
            lines.push("function updateDiaryEntry(date, paragraphs) {");
            lines.push("    var entry = defaultDiaryData.find(function(e) { return e.date === date; });");
            lines.push("    if (entry) { entry.paragraphs = paragraphs; return true; }");
            lines.push("    return false;");
            lines.push("}");
            lines.push("");
            lines.push("function deleteDiaryEntry(date) {");
            lines.push("    var newData = defaultDiaryData.filter(function(e) { return e.date !== date; });");
            lines.push("    if (newData.length === defaultDiaryData.length) return false;");
            lines.push("    defaultDiaryData = newData;");
            lines.push("    return true;");
            lines.push("}");
            lines.push("");
            lines.push("function getDiaryByMonth() {");
            lines.push("    var grouped = {};");
            lines.push("    defaultDiaryData.forEach(function(entry) {");
            lines.push("        var month = entry.date.substring(0, 7);");
            lines.push("        if (!grouped[month]) grouped[month] = [];");
            lines.push("        grouped[month].push(entry);");
            lines.push("    });");
            lines.push("    return grouped;");
            lines.push("}");
            lines.push("");
            lines.push("function getMonthLabel(month) {");
            lines.push("    var parts = month.split(\"-\");");
            lines.push("    return parts[0] + \"年\" + parseInt(parts[1]) + \"月\";");
            lines.push("}");
            lines.push("");
            lines.push("function formatDate(dateStr) {");
            lines.push("    var parts = dateStr.split(\"-\");");
            lines.push("    return parseInt(parts[1]) + \"月\" + parseInt(parts[2]) + \"日\";");
            lines.push("}");
            lines.push("");
            lines.push("function formatDateTitle(dateStr) {");
            lines.push("    var parts = dateStr.split(\"-\");");
            lines.push("    return parts[0] + \".\" + parseInt(parts[1]) + \".\" + parseInt(parts[2]);");
            lines.push("}");
            lines.push("");
            lines.push("// 数据版本号（每次编辑保存时 +1，用于缓存控制）");
            lines.push("var diaryVersion = " + diaryVersion + ";");
            return lines.join("\n");
        }

        // ===== 版本文件管理 =====
        var versionFileHandle = null;

        async function saveVersionHandle(handle) {
            var db = await openDB();
            return new Promise(function(resolve, reject) {
                var tx = db.transaction(STORE_NAME, "readwrite");
                tx.objectStore(STORE_NAME).put(handle, "version_file");
                tx.oncomplete = function() { resolve(); };
                tx.onerror = function() { reject(tx.error); };
            });
        }

        async function loadVersionHandle() {
            var db = await openDB();
            return new Promise(function(resolve, reject) {
                var tx = db.transaction(STORE_NAME, "readonly");
                var req = tx.objectStore(STORE_NAME).get("version_file");
                req.onsuccess = function() { resolve(req.result || null); };
                req.onerror = function() { reject(req.error); };
            });
        }

        async function linkVersionFile() {
            if (!window.showOpenFilePicker) {
                showToast("当前浏览器不支持文件关联功能", "error");
                return;
            }
            try {
                var handle = await window.showOpenFilePicker({
                    types: [{
                        description: "JavaScript 文件",
                        accept: { "application/javascript": [".js"] }
                    }]
                });
                versionFileHandle = handle[0];
                await saveVersionHandle(versionFileHandle);
                updateVersionFileStatus(true);
                showToast("已关联 version.js", "success");
            } catch (e) {
                if (e.name !== "AbortError") {
                    showToast("关联失败: " + e.message, "error");
                }
            }
        }

        function updateVersionFileStatus(linked) {
            var status = document.getElementById("version-file-status");
            if (linked) {
                status.textContent = "已关联，保存时同步更新";
                status.className = "file-status linked";
            } else {
                status.textContent = "未关联，需手动更新";
                status.className = "file-status";
            }
        }

        async function initVersionFileLink() {
            try {
                var handle = await loadVersionHandle();
                if (handle) {
                    versionFileHandle = handle;
                    updateVersionFileStatus(true);
                }
            } catch (e) {
                console.error("加载版本文件句柄失败", e);
            }
        }

        function generateVersionFileContent() {
            return "var diaryVersion = " + diaryVersion + ";\n";
        }

        // 同步写入本地文件（diary-data.js + version.js）
        async function syncToFile() {
            if (!fileHandle) return;
            try {
                // 版本号 +1
                diaryVersion = (diaryVersion || 0) + 1;

                // 写入 diary-data.js
                var hasPermission = await verifyPermission(fileHandle);
                if (!hasPermission) {
                    showToast("文件写入权限被拒绝", "error");
                    return;
                }
                var content = generateFileContent();
                var writable = await fileHandle.createWritable();
                await writable.write(content);
                await writable.close();

                // 写入 version.js
                if (versionFileHandle) {
                    var vPermission = await verifyPermission(versionFileHandle);
                    if (vPermission) {
                        var vContent = generateVersionFileContent();
                        var vWritable = await versionFileHandle.createWritable();
                        await vWritable.write(vContent);
                        await vWritable.close();
                    }
                }
            } catch (e) {
                showToast("同步到文件失败: " + e.message, "error");
            }
        }

        // 页面加载时检查已关联的文件
        async function initFileLink() {
            try {
                var handle = await loadHandle();
                if (handle) {
                    fileHandle = handle;
                    updateFileStatus(true);
                }
            } catch (e) {
                console.error("加载文件句柄失败", e);
            }
        }

        // 显示提示消息
        function showToast(msg, type) {
            var toast = document.getElementById("toast");
            toast.textContent = msg;
            toast.className = "toast show " + (type || "success");
            setTimeout(function() {
                toast.className = "toast";
            }, 2500);
        }

        // 渲染已有日记列表
        function renderList() {
            var data = loadDiaryData();
            var list = document.getElementById("existing-list");

            if (data.length === 0) {
                list.innerHTML = "<li><span>暂无日记</span></li>";
                return;
            }

            var html = "";
            data.forEach(function(entry) {
                html += '<li>';
                html += '<span>' + formatDate(entry.date) + '</span>';
                html += '<div class="item-actions">';
                html += '<button class="btn btn-secondary" onclick="editEntry(\'' + entry.date + '\')">编辑</button>';
                html += '<button class="btn btn-delete" onclick="confirmDelete(\'' + entry.date + '\')">删除</button>';
                html += '</div>';
                html += '</li>';
            });
            list.innerHTML = html;
        }

        // 新增模式：重置表单
        function setTodayDate() {
            var today = new Date();
            var yyyy = today.getFullYear();
            var mm = String(today.getMonth() + 1).padStart(2, '0');
            var dd = String(today.getDate()).padStart(2, '0');
            document.getElementById("date-input").value = yyyy + "-" + mm + "-" + dd;
        }

        function resetForm() {
            editingDate = null;
            document.getElementById("form-title").textContent = "新增日记";
            setTodayDate();
            document.getElementById("date-input").disabled = false;
            document.getElementById("content-input").value = "";
        }

        // 编辑模式：加载已有日记到表单
        function editEntry(date) {
            var entry = getDiaryEntry(date);
            if (entry) {
                editingDate = date;
                document.getElementById("form-title").textContent = "编辑日记 - " + formatDate(date);
                document.getElementById("date-input").value = date;
                document.getElementById("date-input").disabled = true; // 编辑时不可改日期
                document.getElementById("content-input").value = entry.paragraphs.join("\n");
                window.scrollTo({ top: 0, behavior: "smooth" });
            }
        }

        // 保存（新增或更新）
        function saveEntry() {
            var date = document.getElementById("date-input").value;
            var content = document.getElementById("content-input").value;

            if (!date) {
                showToast("请选择日期", "error");
                return;
            }
            if (!content.trim()) {
                showToast("内容不能为空", "error");
                return;
            }

            // 按换行分段
            var paragraphs = content.split("\n").map(function(s) {
                return s.trim();
            }).filter(function(s) {
                return s.length > 0;
            });

            if (editingDate) {
                // 更新
                if (updateDiaryEntry(editingDate, paragraphs)) {
                    showToast("日记已更新", "success");
                    resetForm();
                    renderList();
                    syncToFile();
                } else {
                    showToast("更新失败", "error");
                }
            } else {
                // 新增
                if (addDiaryEntry(date, paragraphs)) {
                    showToast("日记已添加", "success");
                    resetForm();
                    renderList();
                    syncToFile();
                } else {
                    showToast("该日期已存在日记，请直接编辑", "error");
                }
            }
        }

        // 删除确认
        var pendingDeleteDate = null;

        function confirmDelete(date) {
            pendingDeleteDate = date;
            document.getElementById("modal-text").textContent = "确认删除 " + formatDate(date) + " 的日记？";
            document.getElementById("modal").classList.add("show");
        }

        function closeModal() {
            document.getElementById("modal").classList.remove("show");
            pendingDeleteDate = null;
        }

        document.getElementById("modal-confirm").addEventListener("click", function() {
            if (pendingDeleteDate) {
                if (deleteDiaryEntry(pendingDeleteDate)) {
                    showToast("日记已删除", "success");
                    // 如果正在编辑被删除的日记，重置表单
                    if (editingDate === pendingDeleteDate) {
                        resetForm();
                    }
                    renderList();
                    syncToFile();
                } else {
                    showToast("删除失败", "error");
                }
                closeModal();
            }
        });

        // 点击遮罩关闭弹窗
        document.getElementById("modal").addEventListener("click", function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

    </script>
</body>
</html>
