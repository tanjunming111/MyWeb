<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网站 - 我的随笔</title>
    <style>
        body {
            margin: 0;
            opacity: 1;
            transition: opacity 0.2s ease;
        }
        body.loading {
            opacity: 0;
            transition: none;
        }

        /* ===== 顶部导航 ===== */
        .top-bar {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .back-btn {
            display: inline-block;
            padding: 8px 20px;
            background-color: #e0e0e0;
            color: #333;
            text-decoration: none;
            border-radius: 20px;
            font-size: 14px;
            transition: background-color 0.2s ease;
        }
        .back-btn:hover {
            background-color: #d0d0d0;
        }
        .add-btn {
            display: inline-block;
            padding: 8px 20px;
            background-color: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 20px;
            font-size: 14px;
            transition: background-color 0.2s ease;
        }
        .add-btn:hover {
            background-color: #555;
        }

        /* ===== 三栏布局：前言卡片（左）+ 随笔列表（中） + 侧边栏（右） ===== */
        .page-layout {
            max-width: 1360px;
            margin: 30px auto 80px;
            padding: 0 15px;
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }

        /* ===== 前言卡片（左侧） ===== */
        .foreword-card {
            flex: 0 0 260px;          /* 固定宽度 220px，不伸缩 */
            position: sticky;
            top: 30px;                /* 滚动时卡片保持可见 */
            background-color: #faf8f5;
            border: 1px solid #e8e0d5;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .foreword-card h2 {
            margin: 0 0 12px;
            font-size: 18px;
            color: #333;
        }
        .foreword-card p {
            margin: 0;
            font-size: 14px;
            line-height: 1.7;
        }

        /* ===== 随笔列表容器（右侧） ===== */
        .essay-list-wrap {
            flex: 1;                  /* 占据剩余宽度 */
            min-width: 0;
        }

        /* ===== 随笔卡片（链接框，纵向排列） ===== */
        .essay-card {
            display: block;
            background-color: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 16px;
            text-decoration: none;
            color: #333;
            transition: background-color 0.2s ease, box-shadow 0.2s ease;
        }
        .essay-card:hover {
            background-color: #f0f0f0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .essay-card h3 {
            margin: 0 0 6px;
            font-size: 18px;
        }
        .essay-card .essay-date {
            font-size: 13px;
            color: #999;
        }
        .essay-card .essay-summary {
            font-size: 14px;
            color: #666;
            margin-top: 8px;
            line-height: 1.5;
            /* 最多显示两行，超出省略号 */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .empty-msg {
            color: #999;
            font-size: 15px;
            padding: 20px 0;
            text-align: center;
        }
    </style>
</head>
<body class="loading">
    <!-- 顶部头像区域 -->
    <div style="background-color: #f1f1f1; padding: 20px;">
        <a href="../index.html">
            <img src="../tjm.jpg" alt="tjm"
                style="width:80px; height:80px; border-radius:50%; object-fit:cover;">
        </a>
    </div>

    <!-- 导航栏 -->
    <div class="top-bar">
        <a href="../index.html" class="back-btn">&larr; 返回主页</a>
        <a href="e-edit.html" class="add-btn">+ 新增随笔</a>
    </div>

    <!-- 双栏布局：前言卡片（左）+ 随笔列表（右） -->
    <div class="page-layout">
        <aside class="foreword-card">
            <h2>前言</h2>
            <p>日记能记录日常，却难以很好地记录我的一些思考。</p>
            <p>因此，我设立随笔模块，作为我的思考记录的载体。</p>
            <p style="color: #666;">注：6月30日以前的内容为 AI 所写，并非本人创作。</p>
        </aside>
        <div class="essay-list-wrap">
            <div class="essay-container" id="essay-list">
                <!-- 由下方 JavaScript 动态生成 -->
            </div>
        </div>
        <!-- 通过隐藏来实现随笔列表居中，等后面有别的用处再使用 -->
        <aside class="foreword-card" style="opacity:0;">
            <h2>前言</h2>
            <p>这里记录着我的一些随想与感悟，或是生活中的点滴，或是阅读后的思考。愿这些文字能在某个时刻，与你产生共鸣。</p>
        </aside>
    </div>

    <!-- 底部 -->
    <div style="background-color:#f1f1f1; text-align:center; padding:20px;">
        <p>我的网站</p>
        <p><a href="../changelog.html" style="color:#2d8cf0; text-decoration:none;">更新日志</a></p>
    </div>

    <script>
        (function() {
            var s = document.createElement('script');
            s.src = 'essay-data.js?t=' + Date.now();
            s.onload = function() {
                var essays = loadEssayData();
                // 按日期降序排列（最新的在最上面）
                essays.sort(function(a, b) { return a.date < b.date ? 1 : -1; });
                var container = document.getElementById("essay-list");

                if (essays.length === 0) {
                    container.innerHTML = '<p class="empty-msg">暂无随笔。</p>';
                } else {
                    var html = "";
                    for (var i = 0; i < essays.length; i++) {
                        var e = essays[i];
                        html +=
                            '<a href="essay.html?id=' + e.id + '" class="essay-card">' +
                                '<h3>' + e.title + '</h3>' +
                                '<div class="essay-date">' + e.date + '</div>' +
                                '<div class="essay-summary">' + e.summary + '</div>' +
                            '</a>';
                    }
                    container.innerHTML = html;
                }

                // 所有内容渲染完毕，一次性显示页面
                document.body.classList.remove('loading');
            };
            document.head.appendChild(s);
        })();
    </script>
</body>
</html>
