<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网站</title>
    <style>
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .back-btn {
            display: inline-block;
            padding: 8px 20px;
            background-color: #e0e0e0;
            color: #333;
            text-decoration: none;
            border-radius: 20px;
            font-size: 14px;
            transition: background-color 0.2s ease;
        }
        .back-btn:hover {
            background-color: #d0d0d0;
        }
        .edit-btn {
            display: inline-block;
            padding: 8px 20px;
            background-color: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 20px;
            font-size: 14px;
            transition: background-color 0.2s ease;
        }
        .edit-btn:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <div style="background-color: #f1f1f1; padding: 20px;">
        <a href="index.html">
            <img src="tjm.jpg" alt="tjm"
                style="width:80px; height:80px; border-radius:50%; object-fit:cover;">
        </a>
    </div>
    <div style="max-width: 700px; margin: 20px auto 0; padding: 0 15px;">
        <div class="top-bar">
            <a href="menu.html" class="back-btn">&larr; 返回菜单</a>
            <a href="#" class="edit-btn" id="edit-link">编辑日记</a>
        </div>
    </div>
    <div id="diary-content" style="max-width: 700px; margin: 30px auto; padding: 15px; line-height: 1.7;">
        <p style="color: #999; font-size: 15px;">加载中...</p>
    </div>
    <div style="background-color:#f1f1f1; text-align:center; padding:40px;">
        <p>我的网站</p>
    </div>

    <script>
        (function() {
            function renderDiary() {
                var params = new URLSearchParams(window.location.search);
                var date = params.get("date");
                var container = document.getElementById("diary-content");

                if (date) {
                    document.getElementById("edit-link").href = "edit.html?date=" + date;
                    var entry = getDiaryEntry(date);
                    if (entry) {
                        var html = "<h2>Jimmy</h2><hr><h3>" + formatDateTitle(entry.date) + "</h3>";
                        entry.paragraphs.forEach(function(p) {
                            html += "<p>" + p + "</p>";
                        });
                        container.innerHTML = html;
                        document.title = "我的网站 - " + formatDate(entry.date);
                    } else {
                        container.innerHTML = "<h2>Jimmy</h2><hr><p>未找到该日期的日记。</p>";
                    }
                } else {
                    container.innerHTML = "<h2>Jimmy</h2><hr><p>未指定日期。</p>";
                }
            }

            // 先加载 version.js（极小，用时间戳保证最新）
            var s1 = document.createElement('script');
            s1.src = 'version.js?t=' + Date.now();
            s1.onload = function() {
                // 再加载 diary-data.js（用 tim 做缓存键，版本不变时使用缓存）
                var s2 = document.createElement('script');
                s2.src = 'diary-data.js?t=' + tim;
                s2.onload = renderDiary;
                document.head.appendChild(s2);
            };
            document.head.appendChild(s1);
        })();
    </script>
</body>
</html>
