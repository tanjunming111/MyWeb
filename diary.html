<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网站</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .back-btn {
            display: inline-block;
            padding: 8px 20px;
            background-color: #e0e0e0;
            color: #333;
            text-decoration: none;
            border-radius: 20px;
            font-size: 14px;
            transition: background-color 0.2s ease;
        }
        .back-btn:hover {
            background-color: #d0d0d0;
        }
        .edit-btn {
            display: inline-block;
            padding: 8px 20px;
            background-color: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 20px;
            font-size: 14px;
            transition: background-color 0.2s ease;
        }
        .edit-btn:hover {
            background-color: #555;
        }

        /* ===== 日记内容 Markdown 渲染 ===== */
        .diary-body {
            max-width: 700px;
            margin: 30px auto;
            padding: 15px;
            line-height: 1.7;
        }
        .diary-body h2 { font-size: 1.3em; color: #333; margin-bottom: 0.3em; }
        .diary-body hr { border: none; border-top: 1px solid #e0e0e0; margin: 0.5em 0 1em; }
        .diary-body h1 { font-size: 1.6em; margin: 0.6em 0 0.3em; }
        .diary-body h3 { font-size: 1.15em; margin: 0.6em 0 0.3em; }
        .diary-body p { margin: 0.6em 0; }
        .diary-body ul, .diary-body ol { padding-left: 1.5em; margin: 0.5em 0; }
        .diary-body blockquote {
            border-left: 4px solid #ddd;
            padding-left: 12px;
            color: #666;
            margin: 0.5em 0;
        }
        .diary-body code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .diary-body pre {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
        }
        .diary-body pre code { background: none; padding: 0; }
        .diary-body img { max-width: 100%; border-radius: 6px; }
        .diary-body table {
            border-collapse: collapse;
            width: 100%;
            margin: 0.5em 0;
        }
        .diary-body th, .diary-body td {
            border: 1px solid #ddd;
            padding: 8px 10px;
            text-align: left;
        }
        .diary-body th { background: #f5f5f5; }

        /* ===== 加载状态：所有内容渲染完成后再一次性呈现 ===== */
        body {
            opacity: 1;
            transition: opacity 0.25s ease;
        }
        body.loading {
            opacity: 0;
            transition: none;
        }
    </style>
</head>
<body class="loading">
    <div style="background-color: #f1f1f1; padding: 20px;">
        <a href="index.html">
            <img src="tjm.jpg" alt="tjm"
                style="width:80px; height:80px; border-radius:50%; object-fit:cover;">
        </a>
    </div>
    <div style="max-width: 700px; margin: 20px auto 0; padding: 0 15px;">
        <div class="top-bar">
            <a href="menu.html" class="back-btn">&larr; 返回菜单</a>
            <a href="#" class="edit-btn" id="edit-link">编辑日记</a>
        </div>
    </div>
    <div id="diary-content" class="diary-body">
        <!-- 内容由 JavaScript 动态填充 -->
    </div>
    <div style="background-color:#f1f1f1; text-align:center; padding:40px;">
        <p>我的网站</p>
    </div>

    <script>
        (function() {
            var s = document.createElement('script');
            s.src = 'diary-data.js?t=' + Date.now();
            s.onload = function() {
                var params = new URLSearchParams(window.location.search);
                var date = params.get("date");
                var container = document.getElementById("diary-content");

                if (date) {
                    document.getElementById("edit-link").href = "edit.html?date=" + date;
                    var entry = getDiaryEntry(date);
                    if (entry) {
                        var html = "<h2>" + formatDateTitle(entry.date) + "</h2><hr>";
                        html += marked.parse(entry.paragraphs.join("\n\n"));
                        container.innerHTML = html;
                        document.title = "我的网站 - " + formatDate(entry.date);
                    } else {
                        container.innerHTML = "<h2>" + formatDateTitle(date) + "</h2><hr><p>未找到该日期的日记。</p>";
                    }
                }

                // 所有内容渲染完毕，一次性显示页面
                document.body.classList.remove('loading');
            };
            document.head.appendChild(s);
        })();
    </script>
</body>
</html>
