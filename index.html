<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网站</title>
    <style>
        body {
            margin: 0;
            opacity: 1;
            transition: opacity 0.2s ease;
        }
        body.loading {
            opacity: 0;
            transition: none;
        }
        .menu-btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 25px;
            font-size: 16px;
            transition: background-color 0.2s ease;
            margin: 5px;
        }
        .menu-btn:hover {
            background-color: #555;
        }
        .btn-group {
            margin-top: 20px;
        }
        .visitor-count {
            margin-top: 16px;
            font-size: 15px;
            color: #666;
        }
    </style>
</head>
<body class="loading">
    <div style="background: linear-gradient(to bottom, transparent 80%, white 100%), url('background.png') center 55%/cover no-repeat; height: 400px;"></div>
    <div style="
        max-width: 700px;
        margin: -130px auto 20px; /* -60px: 向上偏移60像素，与上方元素重叠；auto: 水平居中，自动计算左右边距；60px: 底部外边距60像素 */
        padding: 15px;
        line-height: 1.7;
        text-align: center;
    ">
        <h2 style="font-size: 36px;">Jimmy</h2>
        <hr>
        <p>欢迎来到我的网站。</p>
        <p>点击下面的按钮查看日记。</p>
        <p class="visitor-count" id="visitor-count">浏览人数：加载中...</p>
        <div class="btn-group">
            <a href="menu.html" class="menu-btn">查看日记</a>
            <a href="edit.html" class="menu-btn">编辑日记</a>
        </div>
    </div>
    <div style="background-color:#f1f1f1; text-align:center; padding:20px;">
        <p>我的网站</p>
        <p><a href="changelog.html" style="color:#2d8cf0; text-decoration:none;">更新日志</a></p>
    </div>

    <script>
        window.addEventListener('load', function() {
            document.body.classList.remove('loading');
        });

        // 获取浏览人数（通过 countapi.xyz 免费计数 API）
        (function() {
            var el = document.getElementById("visitor-count");
            var req = new XMLHttpRequest();
            req.open("GET", "https://api.countapi.xyz/hit/tjm-diary/visitors");
            req.onload = function() {
                if (req.status === 200) {
                    var data = JSON.parse(req.responseText);
                    el.textContent = "浏览人数：" + data.value;
                } else {
                    el.textContent = "浏览人数：获取失败";
                }
            };
            req.onerror = function() {
                el.textContent = "浏览人数：获取失败";
            };
            req.send();
        })();
    </script>
</body>
</html>
